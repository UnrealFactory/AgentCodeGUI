<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>알림 — AgentCodeGUI</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css"
    />
    <!-- 포커스 밖 알림 토스트 — 창=카드(frameless 불투명 검정, main/notifyToast.ts가
         크기·위치를 잡는다). React 없는 초경량 페이지: 스타일은 앱 토큰(styles.css)의 사본. -->
    <style>
      :root {
        --surface: rgba(255, 255, 255, 0.03);
        --surface-2: rgba(255, 255, 255, 0.06);
        --hover: rgba(255, 255, 255, 0.045);
        --line: rgba(255, 255, 255, 0.07);
        --line-2: rgba(255, 255, 255, 0.11);
        --line-strong: rgba(255, 255, 255, 0.2);
        --text: rgba(255, 255, 255, 0.9);
        --text-2: rgba(255, 255, 255, 0.62);
        --text-3: rgba(255, 255, 255, 0.4);
        --text-4: rgba(255, 255, 255, 0.26);
        --green: #82c9a4;
        --blue: #7fa7d8;
        --red: #dd7a6b;
        --amber: #d9a05b;
        --green-soft: rgba(130, 201, 164, 0.12);
        --blue-soft: rgba(127, 167, 216, 0.14);
        --red-soft: rgba(221, 122, 107, 0.13);
        --amber-soft: rgba(217, 160, 91, 0.13);
        --font-sans: 'Wanted Sans Variable', 'Wanted Sans', system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: transparent; }
      body {
        font-family: var(--font-sans);
        color: var(--text);
        /* 불투명 검정 카드 — 유리(아크릴)보다 가독성이 좋다는 사용자 결정. 라운드는
           DWM(창)이 깎으므로 여기선 헤어라인 링만 얹는다. */
        background: #151515;
        box-shadow: inset 0 0 0 1px var(--line-2);
        transition: box-shadow 0.12s, background 0.12s;
        overflow: hidden;
        user-select: none;
        cursor: default;
      }
      /* 단건 카드 = 카드 전체가 클릭 대상 — hover는 카드 전체가 균일하게 한 톤 밝아짐
         (본문에만 밝은 사각형이 깔리면 카드가 두 토막으로 보인다 — 사용자 피드백) */
      body.single { cursor: pointer; }
      body.single:hover {
        background: #1c1c1c;
        box-shadow: inset 0 0 0 1px var(--accent-line);
      }
      button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }

      #card.in { animation: t-in 0.16s ease-out; }
      @keyframes t-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: none; }
      }

      .t-head { display: flex; align-items: center; gap: 6px; padding: 10px 12px 0 14px; }
      .t-head .mascot { color: var(--text-3); flex: none; }
      .t-head .appname {
        font-size: 10.5px; font-weight: 600; letter-spacing: 0.04em;
        color: var(--text-4); text-transform: uppercase;
      }
      .t-close {
        margin-left: auto; width: 22px; height: 22px; border-radius: 6px;
        display: grid; place-items: center; color: var(--text-4); font-size: 13px; line-height: 1;
      }
      .t-close:hover { background: var(--hover); color: var(--text); }

      .t-body { display: flex; gap: 11px; padding: 9px 14px 13px; align-items: flex-start; }
      .t-ico { flex: none; width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; margin-top: 1px; }
      .t-ico svg { width: 14px; height: 14px; }
      .t-ico.done { background: var(--green-soft); color: var(--green); box-shadow: inset 0 0 0 1px rgba(130, 201, 164, 0.25); }
      .t-ico.error { background: var(--red-soft); color: var(--red); box-shadow: inset 0 0 0 1px rgba(221, 122, 107, 0.25); }
      .t-ico.approve { background: var(--amber-soft); color: var(--amber); box-shadow: inset 0 0 0 1px rgba(217, 160, 91, 0.25); }
      .t-ico.ask { background: var(--blue-soft); color: var(--blue); box-shadow: inset 0 0 0 1px rgba(127, 167, 216, 0.25); }
      .t-main { min-width: 0; flex: 1; }
      .t-title { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; }
      .t-title .chat { color: var(--text-2); font-weight: 500; }
      .t-title .chat::before { content: '—'; margin: 0 6px; color: var(--text-4); }
      .t-prev {
        margin-top: 4px; font-size: 12px; line-height: 1.5; color: var(--text-3);
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        word-break: break-all;
      }

      /* 집계형 — 행 클릭 = 그 채팅으로 점프 */
      .t-agg { padding: 6px 14px 13px; }
      .t-agg .sum { font-size: 13px; font-weight: 650; letter-spacing: -0.01em; margin: 2px 0 8px; }
      .t-rows { display: grid; gap: 6px; }
      .t-row {
        display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
        font-size: 12px; color: var(--text-2);
        background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px;
      }
      .t-row:hover { background: var(--surface-2); border-color: var(--line-strong); }
      .t-row i { flex: none; width: 6px; height: 6px; border-radius: 50%; }
      .t-row i.done { background: var(--green); }
      .t-row i.error { background: var(--red); }
      .t-row i.approve { background: var(--amber); }
      .t-row i.ask { background: var(--blue); }
      .t-row .nm { color: var(--text); font-weight: 550; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .t-row .st { margin-left: auto; flex: none; color: var(--text-4); font-size: 11px; }
    </style>
  </head>
  <body>
    <div id="card"></div>
    <script type="module" src="/src/toast.ts"></script>
  </body>
</html>
