# 태그 vX.Y.Z 푸시 → CI 빌드 → SignPath Foundation 서명 → GitHub Release 게시.
# 사전 조건(1회):
#   - SignPath OSS 승인 후 리포 Settings → Secrets and variables → Actions에
#     secret  SIGNPATH_API_TOKEN        (SignPath CI user API token)
#     variable SIGNPATH_ORGANIZATION_ID (SignPath 조직 ID)
#     variable SIGNPATH_PROJECT_SLUG    (SignPath 프로젝트 슬러그)
#   - SignPath 프로젝트에 GitHub를 Trusted Build System으로 연결, artifact configuration은 pe-file 1개.
# 서명이 설치기 바이트를 바꾸므로 blockmap·latest.yml 재생성(scripts/patch-latest-yml.cjs)이 필수.
# 승인 후 후속(첫 서명 릴리즈가 나간 다음): package.json build.win에 "publisherName": "SignPath Foundation"
# 추가 → electron-updater가 업데이트 서명을 검증. 승인 전에 미리 넣으면 중간 무서명 릴리즈를 받은
# 사용자가 인증서를 갈아탈 때 업데이트를 거부하게 되므로 반드시 승인 확정 후에.
name: Release (signed)

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    # SignPath 승인·변수 설정 전에는 스킵 — 그동안은 기존 로컬 `npm run release`로 릴리즈
    if: ${{ vars.SIGNPATH_PROJECT_SLUG != '' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer (unsigned)
        run: npm run package

      - name: Upload unsigned installer
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: dist/AgentCodeGUI-Setup-*.exe
          if-no-files-found: error

      - name: Sign installer (SignPath)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          connector-url: 'https://githubactions.connectors.signpath.io'
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ vars.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          # release-signing 정책이 수동 승인을 요구하면 SignPath 웹에서 승인할 시간 여유
          wait-for-completion-timeout-in-seconds: '3600'
          output-artifact-directory: 'signed'

      - name: Patch updater metadata for signed installer
        run: node scripts/patch-latest-yml.cjs signed dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AgentCodeGUI-Setup-*.exe
            dist/AgentCodeGUI-Setup-*.exe.blockmap
            dist/latest.yml
